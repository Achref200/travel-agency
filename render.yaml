# Render deployment — Next.js server + SQLite on a persistent disk.
# Docs: https://render.com/docs/blueprint-spec
#
# The disk (mounted at /var/data) is only available at RUNTIME, not during the
# build. So the build uses a throwaway local SQLite file (/tmp/build.db) to
# statically generate pages, while the live app reads/writes the persistent
# database on the mounted disk. The start command provisions + seeds that disk
# database on first boot (idempotent on later restarts).
#
# NOTE: persistent disks require a paid instance (Starter). On the free plan the
# filesystem is ephemeral and SQLite data is lost on every restart/redeploy.

services:
  - type: web
    name: travel-agency
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: >-
      npm install &&
      npx prisma generate &&
      DATABASE_URL="file:/tmp/build.db" npx prisma db push --skip-generate &&
      DATABASE_URL="file:/tmp/build.db" npx tsx prisma/seed.ts &&
      DATABASE_URL="file:/tmp/build.db" npm run build
    startCommand: >-
      npx prisma db push --skip-generate &&
      npx tsx prisma/seed.ts &&
      npm run start
    healthCheckPath: /en
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "22.20.0"
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      # Set these in the Render dashboard (marked sync:false so they aren't
      # stored in the repo). ADMIN_SESSION_SECRET must be a long random string.
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
