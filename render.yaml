# Render deployment — Next.js server + SQLite (free plan, ephemeral storage).
# Docs: https://render.com/docs/blueprint-spec
#
# The build uses a throwaway SQLite file (/tmp/build.db) to statically generate
# pages. At runtime the app uses /tmp/dev.db, which the start command provisions
# and seeds on every boot.
#
# NOTE: the free plan has NO persistent disk — the filesystem is ephemeral, so
# the database is rebuilt on each restart/redeploy. Seeded content (tours,
# routes, etc.) always comes back automatically, but runtime data such as
# bookings, contact messages and admin content edits is NOT retained. For
# persistent data, upgrade to a paid plan and add a disk (see git history), or
# move DATABASE_URL to a hosted Postgres.

services:
  - type: web
    name: travel-agency
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: >-
      npm install &&
      npx prisma generate &&
      DATABASE_URL="file:/tmp/build.db" npx prisma db push --skip-generate &&
      DATABASE_URL="file:/tmp/build.db" npx tsx prisma/seed.ts &&
      DATABASE_URL="file:/tmp/build.db" npm run build
    startCommand: >-
      npx prisma db push --skip-generate &&
      npx tsx prisma/seed.ts &&
      npm run start
    healthCheckPath: /en
    envVars:
      - key: NODE_VERSION
        value: "22.20.0"
      - key: DATABASE_URL
        value: file:/tmp/dev.db
      # Set these in the Render dashboard (marked sync:false so they aren't
      # stored in the repo). ADMIN_SESSION_SECRET must be a long random string.
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      # Unsigned upload preset (Cloudinary → Settings → Upload) enabling
      # desktop image uploads from the admin dashboard.
      - key: NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET
        sync: false
